name: ci
on:
  push:
  pull_request:
jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON workflow exports
        run: |
          shopt -s globstar nullglob
          fail=0
          for f in **/*.json; do
            python3 -m json.tool "$f" > /dev/null 2>&1 || { echo "::error file=$f::Invalid JSON"; fail=1; }
          done
          [ "$fail" -eq 0 ] && echo "All JSON parsed OK."
          exit $fail
